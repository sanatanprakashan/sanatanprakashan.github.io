<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Sanatan Prakashan Mandir seal, established 1983">
  <defs>
    <path id="arcTop" d="M 42,100 A 58,58 0 0 1 158,100" />
    <path id="arcBottom" d="M 44,100 A 56,56 0 0 0 156,100" />
    <style>
      .ser { font-family: Georgia, 'Times New Roman', serif; }
    </style>
  </defs>

  <!-- parchment medallion so the crest reads on light or dark backgrounds -->
  <circle cx="100" cy="100" r="96" fill="#f2e7cf" stroke="#2f4a3c" stroke-width="2"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="#b08d3e" stroke-width="3"/>
  <circle cx="100" cy="100" r="84" fill="none" stroke="#2f4a3c" stroke-width="1"/>

  <!-- ring of dots -->
  <g fill="#b08d3e">
    <!-- top curved title -->
  </g>

  <!-- top curved title -->
  <text class="ser" fill="#2f4a3c" font-size="15.5" font-weight="700" letter-spacing="1.2" text-anchor="middle">
    <textPath href="#arcTop" startOffset="50%">SANATAN&#160;PRAKASHAN&#160;MANDIR</textPath>
  </text>

  <!-- bottom curved subtitle -->
  <text class="ser" fill="#9c5a1c" font-size="12" letter-spacing="3" text-anchor="middle">
    <textPath href="#arcBottom" startOffset="50%">H A T H R A S</textPath>
  </text>

  <!-- side stars -->
  <text class="ser" fill="#b08d3e" font-size="13" text-anchor="middle" x="26" y="105">&#9733;</text>
  <text class="ser" fill="#b08d3e" font-size="13" text-anchor="middle" x="174" y="105">&#9733;</text>

  <!-- central emblem: rising-sun rays over an open book -->
  <g transform="translate(100,86)">
    <!-- rays -->
    <g stroke="#b08d3e" stroke-width="1.4">
      <line x1="0" y1="-30" x2="0" y2="-20"/>
      <line x1="-11" y1="-28" x2="-7" y2="-19"/>
      <line x1="11" y1="-28" x2="7" y2="-19"/>
      <line x1="-21" y1="-22" x2="-14" y2="-16"/>
      <line x1="21" y1="-22" x2="14" y2="-16"/>
    </g>
    <!-- open book -->
    <path d="M -30,2 C -18,-6 -4,-6 0,-1 C 4,-6 18,-6 30,2 L 30,20 C 18,12 4,12 0,17 C -4,12 -18,12 -30,20 Z"
          fill="#2f4a3c"/>
    <line x1="0" y1="-1" x2="0" y2="17" stroke="#b08d3e" stroke-width="1.4"/>
    <g stroke="#b08d3e" stroke-width="0.9" opacity="0.8">
      <line x1="-24" y1="4" x2="-6" y2="2"/>
      <line x1="-24" y1="9" x2="-6" y2="7"/>
      <line x1="6" y1="2" x2="24" y2="4"/>
      <line x1="6" y1="7" x2="24" y2="9"/>
    </g>
  </g>

  <!-- ribbon banner: EST. 1983 -->
  <g transform="translate(100,138)">
    <path d="M -52,0 L -40,-9 L -40,9 Z" fill="#7a3f12"/>
    <path d="M 52,0 L 40,-9 L 40,9 Z" fill="#7a3f12"/>
    <rect x="-44" y="-9" width="88" height="18" rx="2" fill="#9c5a1c"/>
    <text class="ser" x="0" y="4.5" fill="#f2e7cf" font-size="11" font-weight="700"
          letter-spacing="2.5" text-anchor="middle">EST. 1983</text>
  </g>
</svg>
